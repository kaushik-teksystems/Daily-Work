<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ToDo App</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h2>ToDo App</h2>

        <div class="input-group">
            <input type="text" id="todo-input" placeholder="What needs to be done?" required>

            <input type="number" id="todo-time-required" placeholder="Time required in Hours" required>

            <button class="add-btn" onclick="addTodo()">Add</button>

            <button class="sort-by-name" onClick="sort()">Sort By Name</button>
        </div>

        <div class="priority-selector">
            <label for="priority-selector">Choose Priority of the Task:</label>
            <select id="priority-selector" name="priority-list">
                <option value="high">High</option>
                <option value="medium" selected>Medium</option>
                <option value="low">Low</option>
            </select>
        </div>

        <div class="list-section">
            <label>Current Tasks</label>
            <ul id="todo-list"></ul>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
